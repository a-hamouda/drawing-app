<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Styles -->
    <link href="style.css" rel="stylesheet" type="text/css">
    <link href="lib/bootstrap/bootstrap.min.css" rel="stylesheet" type="text/css">

    <!-- 3rd party -->
    <script src="lib/p5.min.js" rel="script" type="text/javascript"></script>
    <script src="lib/jquery/jquery-3.6.0.min.js" rel="script" type="text/javascript"></script>
    <script src="lib/bootstrap/bootstrap.bundle.min.js" rel="script" type="text/javascript"></script>

    <!-- Custom scripts -->
    <script src="src/main.js"></script>
    <script src="src/core/sketchConfiguration.js"></script>
    <script src="src/core/sketch.js"></script>
    <script src="src/core/toolbox.js"></script>
    <script src="src/helpers/sketchActions.js"></script>
    <script src="src/helpers/canvasHistory.js"></script>
    <script src="src/helpers/stack.js"></script>
    <script src="src/tools/tool.js"></script>
    <script src="src/tools/freehandTool.js"></script>
    <script src="src/tools/lineToTool.js"></script>
    <script src="src/tools/sprayCanTool.js"></script>
    <script src="src/tools/mirrorDrawTool.js"></script>
    <script src="src/options/toolOption.js"></script>
    <script src="src/options/colorPicker.js"></script>
    <title>Drawing app</title>
</head>
<body>
<!-- Sketch setup popup-->
<div class="modal fade" id="setupPopup" tabindex="-1" role="dialog" data-bs-backdrop="static" data-bs-keyboard="false">
    <div class="modal-dialog modal-dialog-centered" role="document">
        <div class="modal-content">
            <div class="modal-header">
                <h3 class="modal-title">Create a new sketch</h3>
            </div>
            <div class="modal-body">
                <!-- Setup form -->
                <form>
                    <div class="mb-3">
                        <!-- Sketch name field -->
                        <div class="mb-3">
                            <label for="sketchName" class="form-label">Sketch name</label>
                            <input type="text" class="form-control" id="sketchName">
                        </div>
                        <!-- Sketch size fields -->
                        <fieldset class="form-group border rounded-1 p-3">
                            <legend class="float-none w-auto ps-2 pe-2">Canvas</legend>
                            <div class="row">
                                <div class="col">
                                    <div class="mb-3">
                                        <label for="canvasWidth" class="form-label">Width</label>
                                        <div class="input-group flex-nowrap">
                                            <input id="canvasWidth" type="text" class="form-control">
                                            <span class="input-group-text">px</span>
                                        </div>
                                    </div>
                                </div>
                                <div class="col">
                                    <div class="mb-3">
                                        <label for="canvasHeight" class="form-label">Height</label>
                                        <div class="input-group flex-nowrap">
                                            <input id="canvasHeight" type="text" class="form-control">
                                            <span class="input-group-text">px</span>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <!-- Background color picker -->
                            <div class="row">
                                <div class="col">
                                    <div class="dropdown">
                                        <button class="btn btn-outline-secondary dropdown-toggle w-100"
                                                type="button"
                                                data-bs-toggle="dropdown" aria-expanded="false">
                                            Select background color
                                        </button>

                                        <ul id="colorsList" class="dropdown-menu w-100 text-center"></ul>
                                    </div>
                                </div>
                                <!-- Background color viewer -->
                                <div class="col col-2">
                                    <div id="canvasColor" class="input-group-text h-100"></div>
                                </div>
                            </div>
                        </fieldset>
                    </div>
                </form>
            </div>
            <div class="modal-footer" style="border: 0;">
                <button id="startDrawing" type="button" class="btn btn-primary">Start drawing</button>
            </div>
        </div>
    </div>
</div>

<!-- App interface -->
<div id="appInterface" style="display: none" class="user-select-none h-100">
    <!-- Top bar -->
    <div class="container-fluid sidebar bottom-border">
        <div class="row justify-content-between m-auto p-2 ps-0 pe-0">
            <div class="col-auto dropdown ps-0">
                <button id="sketchTitle" type="button" class="btn btn-outline-primary dropdown-toggle"
                        data-bs-toggle="dropdown"></button>
                <ul id="actionList" class="dropdown-menu">
                    <li id="saveImageAction" class="dropdown-item">Save image</li>
                    <li id="clearAction" class="dropdown-item">Clear canvas</li>
                </ul>
            </div>
            <div class="col-auto">
                <div class="row gap-2">
                    <button id="undoButton" type="button" class="col btn btn-outline-primary">
                        <svg fill="none" height="24" stroke="currentColor" stroke-linecap="round"
                             stroke-linejoin="round"
                             stroke-width="2" width="24" xmlns="http://www.w3.org/2000/svg">
                            <path d="M3 7v6h6"/>
                            <path d="M21 17a9 9 0 0 0-9-9 9 9 0 0 0-6 2.3L3 13"/>
                        </svg>
                    </button>
                    <button id="redoButton" type="button" class="col btn btn-outline-primary">
                        <svg fill="none" height="24" stroke="currentColor" stroke-linecap="round"
                             stroke-linejoin="round"
                             stroke-width="2" width="24" xmlns="http://www.w3.org/2000/svg">
                            <path d="M21 7v6h-6"/>
                            <path d="M3 17a9 9 0 0 1 9-9 8.998 8.998 0 0 1 6 2.3l3 2.7"/>
                        </svg>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Center area -->
    <div class="container-fluid d-flex flex-grow-1">
        <div class="row d-flex flex-grow-1">
            <!-- Left bar -->
            <div class="col-auto sidebar right-border p-3">
                <div id="toolbar" class="d-grid" style="grid-template-columns: 1fr 1fr"></div>
            </div>
            <!-- Canvas -->
            <div class="col position-relative overflow-auto p-lg-5">
                <div id="canvasContainer" class="container position-absolute">
                    <div id="sketchCanvas" style="cursor: crosshair"></div>
                </div>
            </div>
            <!--  Right bar -->
            <div class="col-auto sidebar left-border d-flex flex-column justify-content-between p-0">
                <div id="toolPropertiesContainer" class="p-3">
                    <p>Tool Options</p>
                    <div id="toolOptions" class="container p-0"></div>
                </div>
                <div class="top-border">
                    <div class="p-3">
                        <p>Canvas Info</p>
                        <div class="container fs-sm">
                            <div class="row row-cols-auto">
                                <div class="col col-auto">
                                    <div class="row row-cols-auto">
                                        <div class="col d-flex justify-content-center align-content-center align-items-center ps-0">
                                            <svg width="17" height="15" fill="none" xmlns="http://www.w3.org/2000/svg">
                                                <path stroke="#fff" d="M8.5 0v15M17 7.5H0"/>
                                            </svg>
                                        </div>
                                        <div class="col p-0">
                                            <div class="row">
                                                <div class="col pe-1">X :</div>
                                                <div id="canvasInfoMouseX" class="col ps-0" style="width: 75px">0000px
                                                </div>
                                            </div>
                                            <div class="row">
                                                <div class="col pe-1">Y :</div>
                                                <div id="canvasInfoMouseY" class="col ps-0" style="width: 75px">0000px
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                                <div class="col verticalLine p-0"></div>
                                <div class="col col-auto">
                                    <div class="row row-cols-auto">
                                        <div class="col d-flex justify-content-center align-content-center align-items-center ps-0">
                                            <svg width="17" height="15" fill="none" xmlns="http://www.w3.org/2000/svg">
                                                <path stroke="#fff" d="M.5 0v15M16.5 0v15M17 .5H0M17 14.5H0"/>
                                            </svg>
                                        </div>
                                        <div class="col-auto p-0">
                                            <div class="row">
                                                <div class="col">W :</div>
                                                <div id="canvasInfoWidth" class="col ps-1">0000px</div>
                                            </div>
                                            <div class="row">
                                                <div class="col">H :</div>
                                                <div id="canvasInfoHeight" class="col ps-1">0000px</div>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <div class="pt-3 w-50">
                            <div class="mb-3">
                                <label for="canvasZoom" class="form-label fs-sm">Zoom</label>
                                <div class="input-group">
                                    <button class="btn btn-outline-secondary" id="canvasIncreaseZoom" type="button"> +
                                    </button>
                                    <input disabled id="canvasZoom" type="text" class="form-control text-center">
                                    <button class="btn btn-outline-secondary" id="canvasDecreaseZoom" type="button"> -
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
